name: Xây dựng Kernel OKI 6.1.118
env:
  TZ: Asia/Ho_Chi_Minh
  ANDROID_VERSION: 'android14'
  KERNEL_VERSION: '6.1'
  SUB_VERSION: '118'
  KERNEL_NAME: 'android14-11-o-p0s3id0n'
  CCACHE_KEY: ccache-neov4-6.1.118

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'Các nhánh KernelSU (ReSukiSU/SukiSU Ultra/KernelSU Next/KSU (bản gốc)/Không có KSU tích hợp, mặc định là ReSukiSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: 'Bật susfs (để tăng cường chức năng gắn kết của các môi trường ẩn; có thể làm tăng nhẹ mức tiêu thụ điện năng; có thể tắt nếu các bản cập nhật từ nguồn gốc gây ra sự không ổn định hoặc nếu không cần thiết).'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: 'Bật kpm (builtin - sử dụng kpm tích hợp sẵn trong (re)sukisu, kpn - sử dụng triển khai kpm độc lập (hỗ trợ bất kỳ môi trường KSU/Mask nào); có thể để tắt theo mặc định nếu không cần).'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: 'Cài đặt bản vá LZ4 1.10.0 + ZSTD 1.5.7 và bản vá LZ4KD'
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        description: 'Cài đặt bản vá LZ4KD? (Nếu bản vá LZ4+ZSTD đã được kích hoạt, bước này không cần thiết.)'
        required: true
        type: boolean
        default: 'false'
      bbr_enable:
        description: 'Bật hoặc tắt thuật toán BBR (tối ưu hóa dữ liệu đường lên, nhưng ít mang lại lợi ích thiết thực cho việc sử dụng điện thoại di động hàng ngày và thậm chí có thể gây ra hiện tượng tối ưu hóa ngược; false sẽ tắt nó, true chỉ thêm thuật toán, default đặt nó làm mặc định).'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: 'Bật tắt chức năng mạng (được sử dụng để hỗ trợ ipset và các chương trình yêu cầu hỗ trợ nhân hệ điều hành cho các chức năng mạng nâng cao như iptables).'
        required: true
        type: boolean
        default: 'false'
      ssg_enable:
        description: 'Bật tắt SSG IO (cải thiện hiệu suất đọc/ghi IO; có thể gây ra lỗi trên Find X7U & OP 12).''
        required: true
        type: boolean
        default: 'true'
      rekernel_enable:
        description: 'Kích hoạt hỗ trợ Re-Kernel (để hoạt động với các phần mềm như Freezer/NoActive nhằm cải thiện khả năng đóng băng ứng dụng).'
        required: true
        type: boolean
        default: 'false'
      baseband_guard:
        description: 'Kích hoạt tính năng bảo vệ băng tần cơ sở ở cấp độ nhân hệ điều hành (ngăn chặn mọi thao tác ghi vào các phân vùng không phải của người dùng, từ đó ngăn chặn việc định dạng hệ thống).'
        required: true
        type: boolean
        default: 'true'
      ccache_update:
        description: 'Cập nhật bộ nhớ cache ccache (thao tác này sẽ ghi đè bộ nhớ cache ccache được tạo trong quá trình biên dịch này bằng bộ nhớ cache của kho lưu trữ; hãy bật tùy chọn này khi bạn thay đổi cấu hình biên dịch, mã nguồn hoặc cần làm mới bộ nhớ cache).'
        required: true
        type: boolean
        default: 'false'
      ccache_debug:
        description: 'Tải lên nhật ký gỡ lỗi Ccache (cho mục đích gỡ lỗi; không cần bật tùy chọn này).'
        required: true
        type: boolean
        default: 'false'
      kernel_suffix:
        description: 'Hậu tố Kernel (để trống để sử dụng mặc định, không thêm dấu gạch ngang, khoảng trắng hoặc các ký tự dành riêng khác có thể ảnh hưởng đến việc thực thi lệnh)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 🔍Cài đặt các phụ thuộc môi trường và khởi tạo kho mã nguồn cũng như bộ công cụ llvm-Clang20.
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "Kho lưu trữ hiện tại：$GITHUB_REPOSITORY"
          echo "Nhánh hiện tại：$GITHUB_REF_NAME"
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache &
          #Các lệnh đầy đủ của phiên bản cũ: (Vì hầu hết các lệnh đã được xác minh là tích hợp sẵn trong môi trường GitHub Actions, nên chúng đã được đơn giản hóa)
          #sudo apt-get install -y --no-install-recommends curl bison flex make binutils git perl gcc python3 python-is-python3 bc libssl-dev libelf-dev zip unzip ccache
          
          echo "Sao chép kho mã nguồn..."
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8650/archive/refs/heads/oneplus/sm8650_b_16.0.0_oneplus12.zip -o common.zip && 
          unzip -q common.zip && 
          mv "android_kernel_common_oneplus_sm8650-oneplus-sm8650_b_16.0.0_oneplus12" common &&
          rm -rf common.zip &
          
          echo "Sao chép bộ công cụ llvm-Clang20..." &&
          mkdir -p clang20 &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip -o clang.zip &&
          unzip -q clang.zip -d clang20 &&
          rm -rf clang.zip &
          
          echo "正在克隆构建工具..." &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip -o build-tools.zip &&
          unzip -q build-tools.zip &&
          rm -rf build-tools.zip &
          
          wait
          echo "Quá trình khởi tạo toàn bộ mã nguồn và chuỗi công cụ llvm-Clang20 đã hoàn tất!"
          echo "Đang gỡ bỏ bảo vệ ABI và gỡ bỏ hậu tố thay đổi..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 🎯Cấu hình thư mục Ccache
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          echo "当前磁盘空间："
          df -h
          echo "Phiên bản hạt nhân hiện tại:${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}"

      - name: 📦Tải bộ nhớ cache Ccache của phiên bản kernel hiện tại.
        uses: actions/cache@v5
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: 📦Tải bộ nhớ cache Ccache mặc định công khai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Kiểm tra trạng thái bộ đệm cục bộ..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "Bộ nhớ cache ccache cục bộ đã được tải thành công, bỏ qua bước tải bộ nhớ cache ccache công khai!"
            exit 0
          fi
          
          echo "Không tìm thấy bộ nhớ cache, đang cố gắng tải phiên bản ccache công khai mới nhất... "
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "Đã tải xuống thành công $FILE_NAME, đang giải nén..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "Khôi phục ccache công khai đã hoàn tất!"
          else
            echo "Tệp ccache tương ứng không được tìm thấy trong kho lưu trữ ccache công khai, do đó quá trình biên dịch lại toàn bộ sẽ được thực hiện...."
          fi

      - name: 🧹Xóa bộ nhớ cache Ccache cũ
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Xóa bộ nhớ cache ccache cũ khỏi kho lưu trữ..."
          if gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "Đã xóa thành công bộ nhớ cache ccache cũ!"
          else
            echo "Bộ nhớ cache cũ không tồn tại hoặc đã bị xóa!"
          fi
      
      - name: ♻️Khởi tạo và cấu hình ccache
        run: |
          # Thiết lập các biến môi trường ccache
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          # Đảm bảo thư mục ccache tồn tại.
          mkdir -p "$CCACHE_DIR"
          
          # Cấu hình lại kích thước bộ nhớ cache trong mỗi lần chạy.
          echo "Cấu hình kích thước bộ nhớ cache ccache thành: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          # Hiển thị trạng thái bộ đệm ban đầu
          echo "Trạng thái ban đầu của ccache:"
          ccache -s
          
          # Nếu bộ nhớ đệm được khôi phục và tìm thấy kết quả phù hợp, hãy hiển thị thông tin chi tiết.
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "Chi tiết truy cập bộ nhớ cache ccache:"
            ccache -sv
          fi

      - name: 🔀Thêm KernelSU
        id: ksu_version
        run: |
          # Vào thư mục làm việc của nhân hệ điều hành
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            echo "Cấu hình SukiSU Ultra..."
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            # Lấy mã hash (8 ký tự) của commit Git hiện tại
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            echo "当前提交哈希: $GIT_COMMIT_HASH"
            export KSU_VERSION=$KSU_VERSION
            # Thử truy xuất số phiên bản API KernelSU tối đa 3 lần
            for i in {1..3}; do
              # Trích xuất KSU_API_VERSION từ Kbuild
              KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Makefile" | 
                # Tìm dòng đầu tiên chứa định nghĩa phiên bản
                grep -m1 "KSU_VERSION_API :=" | 
                # Trích xuất giá trị sau dấu bằng
                awk -F'= ' '{print $2}' | 
                # Loại bỏ tất cả các ký tự khoảng trắng
                tr -d '[:space:]')
              # Nếu lấy được số phiên bản thành công, sẽ thoát khỏi vòng lặp; nếu không, sẽ đợi 1 giây và thử lại.
              [ -n "$KSU_API_VERSION" ] && break || sleep 1
            done
            # Nếu quá trình truy xuất thất bại, hãy sử dụng số phiên bản mặc định là 3.1.7
            [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"
            # Lưu số phiên bản API vào biến môi trường GitHub
            echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV
            # Tạo mẫu định nghĩa phiên bản và hàm định dạng phiên bản: sử dụng mã băm commit đã truy xuất và hậu tố cố định
            # KSU_VERSION_API: Định nghĩa phiên bản API
            # KSU_VERSION_FULL: Định nghĩa phiên bản đầy đủ
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'@cctv18\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'@cctv18'
            # Dọn dẹp các định nghĩa phiên bản cũ trong kernel Kbuild
            # Xóa các hàm phiên bản
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Makefile
            # Xóa định nghĩa phiên bản API
            sed -i '/KSU_VERSION_API :=/d' kernel/Makefile
            # Xóa định nghĩa phiên bản đầy đủ
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Makefile
            # Chèn định nghĩa phiên bản mới sau dòng REPO_OWNER
            awk -v def="$VERSION_DEFINITIONS" '
              # Khi tìm thấy dòng REPO_OWNER, hãy chèn định nghĩa phiên bản và đặt cờ.
              /REPO_OWNER :=/ {print; print def; inserted=1; next}
              # In tất cả các dòng
              1
              # Nếu không tìm thấy điểm chèn, hãy thêm vào cuối tệp
              END {if (!inserted) print def}
            ' kernel/Makefile > kernel/Makefile.tmp && mv kernel/Makefile.tmp kernel/Makefile

            # Tạo số phiên bản tùy chỉnh (dựa trên số lần commit), sử dụng 114514 nếu không thành công.
            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
            # Lưu số phiên bản vào biến môi trường GitHub
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT

            # Xác minh kết quả chỉnh sửa
            grep -A10 "REPO_OWNER" kernel/Kbuild # Kiểm tra nội dung sau điểm chèn
            grep "KSU_VERSION_FULL" kernel/Kbuild # Xác nhận định nghĩa phiên bản tồn tại
            echo "Số phiên bản SukiSU: v${KSU_API_VERSION}-${GIT_COMMIT_HASH}@psd"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            echo "Đang cấu hình ReSukiSU..."
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            # Tạo số phiên bản tùy chỉnh (dựa trên số lần commit), sử dụng 114514 nếu không thành công.
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
            # Lưu số phiên bản vào biến môi trường GitHub
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            echo "Đang cấu hình KernelSU Next..."
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            cd KernelSU-Next
            rm -rf .git
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=dev&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" kernel/Kbuild
            KSU_GIT_TAG=$(curl -sL "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/tags" | grep -o '"name": *"[^"]*"' | head -n 1 | sed 's/"name": "//;s/"//')
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" kernel/Kbuild
            #Thêm hỗ trợ WildKSU Manager vào KernelSU Next
            cd ../common/drivers/kernelsu
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/apk_sign.patch
            patch -p2 -N -F 3 < apk_sign.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "Đang cấu hình KernelSU gốc (tiann/KernelSU)..."
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          else
            echo "Đã chọn chế độ không có KernelSU tích hợp sẵn, bỏ qua cấu hình KernelSU..."
          fi

      - name: 🔀Áp dụng các bản vá KernelSU & SUSFS
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} != "none" ]]; then
            echo "--- Bắt đầu thêm bản vá SUSFS ---"
            git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
            cd ..
          else
            echo "Đã chọn chế độ không có KernelSU tích hợp sẵn, bỏ qua cấu hình susfs..."
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "Thêm bản vá vào KernelSU gốc (tiann/KernelSU)..."
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            cd ./KernelSU
            patch -p1 < 10_enable_susfs_for_ksu.patch || true
          fi
          
      - name: 🔀Áp dụng các bản vá lz4 1.10.0 & zstd 1.5.7
        if: inputs.lz4_enable
        run: |
          echo "Đang áp dụng các bản vá LZ4 và ZSTD từ kho lưu trữ..."
          cd kernel_workspace
          git clone --depth=1 https://github.com/$GITHUB_REPOSITORY.git -b $GITHUB_REF_NAME $GITHUB_ACTOR
          cp ./$GITHUB_ACTOR/zram_patch/001-lz4.patch ./common/
          cp ./$GITHUB_ACTOR/zram_patch/lz4armv8.S ./common/lib
          cp ./$GITHUB_ACTOR/zram_patch/002-zstd.patch ./common/
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: 🔀Áp dụng bản vá lz4kd
        if: inputs.lz4kd_enable
        run: |
          echo "Thêm bản vá lz4kd…"
          cd kernel_workspace
          if [ ! -d "SukiSU_patch" ]; then
            git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git
          fi
          cd common
          cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./lib
          cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
          cp ../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true
          

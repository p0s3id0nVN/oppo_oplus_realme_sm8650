name: Phát hành bản thử nghiệm (Release Test)

env:
  TZ: Asia/Ho_Chi_Minh
  ANDROID_VERSION: 'android14'
  KERNEL_VERSION: '6.1'
  SUB_VERSION: '118'
  KERNEL_NAME: 'android14-11-o-gca13bffobf09'
  CCACHE_KEY: ccache-neov4-6.1.118

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'Nhánh KernelSU (ReSukiSU/SukiSU Ultra/KernelSU Next/KSU Gốc/Không tích hợp, mặc định là ReSukiSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: 'Bật SUSFS (Tăng cường ẩn mount; có thể gây tốn pin nhẹ hoặc kém ổn định nếu thượng nguồn cập nhật lỗi)'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: 'Bật KPM (builtin: dùng kpm tích hợp của (re)sukisu, kpn: dùng kpm độc lập cho mọi môi trường KSU/Magisk)'
        required: true
        type: choice
        default: 'builtin'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: 'Cài đặt bản vá lz4 1.10.0+zstd 1.5.7 và bản vá LZ4KD'
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        description: 'Cài đặt bản vá LZ4KD (Không cần nếu đã bật lz4+zstd ở trên)'
        required: true
        type: boolean
        default: 'false'
      bbr_enable:
        description: 'Bật thuật toán BBR (Tối ưu upload, không quá quan trọng với sử dụng hàng ngày; true: chỉ thêm thuật toán, default: đặt làm mặc định)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: 'Mở rộng cấu hình mạng (Hỗ trợ ipset, iptables và các tính năng mạng nâng cao cho ứng dụng)'
        required: true
        type: boolean
        default: 'false'
      ssg_enable:
        description: 'Bật bộ điều phối Samsung SSG IO (Tăng hiệu suất đọc/ghi; có thể gây lỗi trên OnePlus 12)'
        required: true
        type: boolean
        default: 'true'
      rekernel_enable:
        description: 'Bật hỗ trợ Re-Kernel (Phối hợp với Freezer/NoActive để tăng khả năng đóng băng ứng dụng)'
        required: true
        type: boolean
        default: 'false'
      baseband_guard:
        description: 'Bảo vệ Baseband ở cấp nhân (Chặn ghi vào các phân vùng không phải của người dùng, chống brick máy)'
        required: true
        type: boolean
        default: 'true'
      kernel_suffix:
        description: 'Hậu tố nhân (Để trống nếu mặc định, không thêm dấu gạch nối ở đầu, không dùng khoảng trắng)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    steps:
      - name: Thêm số phiên bản KernelSU
        id: ksu_version
        run: |
          KSU_VERSION="114514"
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          
      - name: Clone AnyKernel3 và đóng gói
        id: create_zip
        run: |
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KSUNext"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="none"
          fi
          
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ github.event.inputs.kernel_suffix }}.zip
          else
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ env.KERNEL_NAME }}.zip
          fi
          truncate -s 30M testfile
          zip -r ./$AK3_NAME ./testfile
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: Tải lên ZIP Artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/AnyKernel*.zip
          archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      
    steps:
      - name: Tải xuống ZIP Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips
          skip-decompress: true

      - name: Thiết lập biến môi trường
        run: |
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ github.event.inputs.kernel_suffix }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ env.KERNEL_NAME }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          fi
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU Ultra"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KernelSU Next"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KernelSU (Chính thức)"
          else
            KSU_TYPENAME="Không tích hợp KSU"
          fi
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV